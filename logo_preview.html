<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 40px; padding: 40px; background: #f5f5f5; }
        .logo-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 250px; }
        h3 { color: #333; margin-bottom: 20px; }
        svg { width: 150px; height: 150px; }
    </style>
</head>
<body>
    <div class="logo-card">
        <h3>1. AI Shopfront</h3>
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#FF9E00;stop-opacity:1" />
                </linearGradient>
            </defs>
            <path d="M40 80 L100 40 L160 80 L160 160 L40 160 Z" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linejoin="round"/>
            <rect x="85" y="120" width="30" height="40" rx="4" fill="url(#grad1)" />
            <circle cx="100" cy="75" r="5" fill="#2D3436" />
            <line x1="100" y1="75" x2="80" y2="95" stroke="#2D3436" stroke-width="3" />
            <line x1="100" y1="75" x2="120" y2="95" stroke="#2D3436" stroke-width="3" />
            <circle cx="80" cy="95" r="4" fill="#2D3436" />
            <circle cx="120" cy="95" r="4" fill="#2D3436" />
        </svg>
    </div>

    <div class="logo-card">
        <h3>2. Smart Pulse</h3>
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 70 L140 70 L150 160 L50 160 Z" fill="none" stroke="#0984E3" stroke-width="8" stroke-linejoin="round"/>
            <path d="M75 70 C 75 30, 125 30, 125 70" fill="none" stroke="#74B9FF" stroke-width="6" stroke-dasharray="10,5"/>
            <circle cx="100" cy="115" r="15" fill="#0984E3" fill-opacity="0.2" />
            <path d="M85 115 L95 105 L105 125 L115 115" fill="none" stroke="#0984E3" stroke-width="4" stroke-linecap="round"/>
        </svg>
    </div>

    <div class="logo-card">
        <h3>3. Neural 'K'</h3>
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="50" r="8" fill="#FF6B00" />
            <circle cx="60" cy="100" r="8" fill="#FF6B00" />
            <circle cx="60" cy="150" r="8" fill="#FF6B00" />
            <circle cx="110" cy="80" r="8" fill="#FF6B00" />
            <circle cx="140" cy="50" r="8" fill="#FF6B00" />
            <circle cx="110" cy="120" r="8" fill="#FF6B00" />
            <circle cx="140" cy="150" r="8" fill="#FF6B00" />
            <line x1="60" y1="50" x2="60" y2="150" stroke="#FF6B00" stroke-width="3" />
            <line x1="60" y1="100" x2="110" y2="80" stroke="#FF6B00" stroke-width="3" />
            <line x1="110" y1="80" x2="140" y2="50" stroke="#FF6B00" stroke-width="3" />
            <line x1="60" y1="100" x2="110" y2="120" stroke="#FF6B00" stroke-width="3" />
            <line x1="110" y1="120" x2="140" y2="150" stroke="#FF6B00" stroke-width="3" />
        </svg>
    </div>

    <div class="logo-card">
        <h3>4. Infinite Supply</h3>
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M60 100 C 20 60, 20 140, 60 100 C 100 60, 140 60, 180 100 C 140 140, 100 140, 60 100" fill="none" stroke="#6C5CE7" stroke-width="8" />
            <rect x="70" y="90" width="60" height="40" fill="none" stroke="#A29BFE" stroke-width="4" stroke-dasharray="2,2"/>
        </svg>
    </div>

    <div class="logo-card">
        <h3>5. Pixel-Grain</h3>
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M100 40 C 60 40, 50 100, 100 160 C 150 100, 140 40, 100 40" fill="#FFC312" />
            <rect x="95" y="60" width="10" height="10" fill="white" />
            <rect x="80" y="80" width="10" height="10" fill="white" />
            <rect x="110" y="80" width="10" height="10" fill="white" />
            <rect x="95" y="100" width="10" height="10" fill="white" />
        </svg>
    </div>
    <div class="logo-card" style="width: 100%; max-width: 540px;">
        <h3>✨ FINAL CHOICE: Hybrid (2 + 5) ✨</h3>
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="hybridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#FFC312;stop-opacity:1" />
                </linearGradient>
            </defs>
            <!-- Grain-Shaped Bag Body -->
            <path d="M60 80 C 60 80, 50 140, 100 170 C 150 140, 140 80, 140 80 L60 80 Z" fill="url(#hybridGrad)" />
            <!-- Pulse Handle -->
            <path d="M75 80 C 75 40, 125 40, 125 80" fill="none" stroke="#0984E3" stroke-width="8" stroke-linecap="round"/>
            <path d="M90 50 L100 40 L110 60 L120 50" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
            <!-- Pixel Cutouts -->
            <rect x="85" y="100" width="12" height="12" fill="white" fill-opacity="0.8" />
            <rect x="103" y="100" width="12" height="12" fill="white" fill-opacity="0.4" />
            <rect x="85" y="118" width="12" height="12" fill="white" fill-opacity="0.4" />
            <rect x="103" y="118" width="12" height="12" fill="white" fill-opacity="0.8" />
        </svg>
        <p>A fusion of the <b>Pulse Handle</b> (Modern UI/Efficiency) and the <b>Pixel-Grain Silhouette</b> (Organic roots/AI Data).</p>
    </div>
</body>
</html>
